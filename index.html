<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>特价房源</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #cfd7e3;
      --head: #e8f2ef;
      --brand: #13715f;
      --danger: #b42318;
      --warn: #b54708;
      --soft-danger: #fff0ed;
      --soft-warn: #fff5df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 12px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr .8fr .8fr auto;
      gap: 8px;
      align-items: center;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .toolbar input,
    .toolbar select {
      height: 38px;
      padding: 0 10px;
      min-width: 0;
    }

    .btn {
      height: 38px;
      border-radius: 6px;
      padding: 0 12px;
      font-weight: 800;
      white-space: nowrap;
      background: #edf3f8;
      color: var(--text);
    }

    .btn.primary {
      background: var(--brand);
      color: #fff;
    }

    .btn.danger {
      color: var(--danger);
      background: #fff0ed;
    }

    .summary {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }

    .pill {
      flex: 0 0 auto;
      min-width: 92px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }

    .pill strong {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }

    .pill span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .table-wrap {
      flex: 1;
      overflow: auto;
      background: #fff;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    table {
      width: max(1180px, 100%);
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    th, td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px;
      vertical-align: middle;
      word-break: break-word;
      background: #fff;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--head);
      text-align: center;
      font-weight: 900;
    }

    th:first-child,
    td:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      border-left: 1px solid var(--line);
    }

    th:first-child { z-index: 4; }

    tbody tr.expired td { background: var(--soft-danger); }
    tbody tr.soon td { background: var(--soft-warn); }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .row-btn {
      min-height: 30px;
      border-radius: 5px;
      font-weight: 800;
      background: #edf3f8;
      color: var(--text);
    }

    .row-btn.danger {
      background: #fff;
      color: var(--danger);
      border: 1px solid #f4b2a8;
    }

    .price {
      color: var(--danger);
      font-weight: 900;
      text-align: right;
    }

    .center { text-align: center; }
    .muted { color: var(--muted); }

    .empty {
      padding: 42px 12px;
      color: var(--muted);
      text-align: center;
    }

    dialog {
      width: min(760px, calc(100% - 20px));
      max-height: calc(100dvh - 24px);
      border: 0;
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 20px 70px rgba(16, 24, 40, .25);
    }

    dialog::backdrop { background: rgba(15, 23, 42, .46); }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .modal-head strong { font-size: 18px; }

    .form {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      min-width: 0;
    }

    .form label.full { grid-column: 1 / -1; }

    .form input,
    .form select,
    .form textarea {
      padding: 9px;
      border-radius: 6px;
      min-width: 0;
    }

    .form textarea {
      min-height: 72px;
      resize: vertical;
    }

    .modal-actions {
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
    }

    .modal-actions button {
      height: 42px;
      border-radius: 6px;
      font-weight: 900;
    }

    .tools {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tools label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      border-radius: 6px;
      background: #edf3f8;
      font-weight: 800;
    }

    .tools input { display: none; }

    @media (max-width: 680px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar input {
        grid-column: 1 / -1;
      }

      .form {
        grid-template-columns: 1fr;
      }

      .form label.full {
        grid-column: auto;
      }

      table {
        width: 1120px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <div class="title-row">
        <h1>特价房源浏览表</h1>
        <div>
          <button class="btn" id="openTools">备份</button>
          <button class="btn primary" id="addListing">新增</button>
        </div>
      </div>
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="搜索项目、区域、户型、楼栋、备注">
        <input id="areaFilter" type="text" placeholder="区域">
        <select id="budgetFilter">
          <option value="">全部总价</option>
          <option value="under100">100万以下</option>
          <option value="100-150">100-150万</option>
          <option value="150-200">150-200万</option>
          <option value="200-300">200-300万</option>
          <option value="over300">300万以上</option>
        </select>
        <select id="statusFilter">
          <option value="">全部状态</option>
          <option>在售</option>
          <option>待确认</option>
          <option>已售</option>
          <option>暂停</option>
        </select>
      </div>
    </section>

    <section class="summary">
      <div class="pill"><strong id="totalCount">0</strong><span>全部</span></div>
      <div class="pill"><strong id="activeCount">0</strong><span>有效</span></div>
      <div class="pill"><strong id="soonCount">0</strong><span>快截止</span></div>
      <div class="pill"><strong id="expiredCount">0</strong><span>已过期</span></div>
    </section>

    <section class="table-wrap">
      <table>
        <colgroup>
          <col style="width: 92px">
          <col style="width: 64px">
          <col style="width: 150px">
          <col style="width: 88px">
          <col style="width: 96px">
          <col style="width: 88px">
          <col style="width: 100px">
          <col style="width: 110px">
          <col style="width: 110px">
          <col style="width: 90px">
          <col style="width: 96px">
          <col style="width: 230px">
          <col style="width: 190px">
        </colgroup>
        <thead>
          <tr>
            <th>操作</th>
            <th>序号</th>
            <th>项目</th>
            <th>区域</th>
            <th>特价总价</th>
            <th>面积</th>
            <th>户型</th>
            <th>楼栋房号</th>
            <th>截止时间</th>
            <th>装修</th>
            <th>状态</th>
            <th>核心卖点</th>
            <th>备注</th>
          </tr>
        </thead>
        <tbody id="listingBody"></tbody>
      </table>
      <div class="empty" id="emptyState" hidden>暂无符合条件的特价房源</div>
    </section>
  </main>

  <dialog id="listingDialog">
    <form method="dialog" id="listingForm">
      <div class="modal-head">
        <strong id="dialogTitle">新增特价房</strong>
        <button type="button" class="btn" id="closeDialog">关闭</button>
      </div>
      <div class="form">
        <label>项目名称
          <input name="projectName" required autocomplete="off" placeholder="可写内部简称">
        </label>
        <label>区域
          <input name="area" autocomplete="off" placeholder="例如：经开、包河">
        </label>
        <label>特价总价/万
          <input name="specialPrice" inputmode="decimal" autocomplete="off" placeholder="例如：125">
        </label>
        <label>原总价/万
          <input name="originalPrice" inputmode="decimal" autocomplete="off" placeholder="可不填">
        </label>
        <label>面积/㎡
          <input name="size" inputmode="decimal" autocomplete="off" placeholder="例如：94">
        </label>
        <label>户型
          <input name="layout" autocomplete="off" placeholder="例如：三房两厅">
        </label>
        <label>楼栋房号
          <input name="room" autocomplete="off" placeholder="例如：3#1201">
        </label>
        <label>截止时间
          <input name="deadline" type="date">
        </label>
        <label>装修
          <select name="decoration">
            <option>毛坯</option>
            <option>精装</option>
            <option>简装</option>
            <option>其他</option>
          </select>
        </label>
        <label>状态
          <select name="status">
            <option>在售</option>
            <option>待确认</option>
            <option>已售</option>
            <option>暂停</option>
          </select>
        </label>
        <label class="full">核心卖点
          <textarea name="sellingPoint" placeholder="例如：低总价、现房、边户、楼层好、近地铁"></textarea>
        </label>
        <label class="full">备注
          <textarea name="note" placeholder="客户适配、付款要求、佣金提醒、案场口径"></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" id="cancelEdit">取消</button>
        <button type="submit" class="btn primary">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="toolsDialog">
    <div class="modal-head">
      <strong>数据备份</strong>
      <button type="button" class="btn" id="closeTools">关闭</button>
    </div>
    <div class="tools">
      <button class="btn" id="exportData">导出备份</button>
      <label>导入备份<input id="importData" type="file" accept="application/json"></label>
      <button class="btn" id="clearFilters">清除筛选</button>
      <button class="btn danger" id="clearAll">清空数据</button>
    </div>
  </dialog>

  <script>
    const STORAGE_KEY = "hf_special_listing_v1";
    const $ = (selector) => document.querySelector(selector);
    const body = $("#listingBody");
    const emptyState = $("#emptyState");
    const form = $("#listingForm");
    const dialog = $("#listingDialog");
    const toolsDialog = $("#toolsDialog");
    let listings = loadListings();
    let editingId = null;

    const fields = [
      "projectName", "area", "specialPrice", "originalPrice", "size", "layout",
      "room", "deadline", "decoration", "status", "sellingPoint", "note"
    ];

    function loadListings() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveListings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(listings));
    }

    function todayText() {
      const date = new Date();
      date.setHours(0, 0, 0, 0);
      return date.toISOString().slice(0, 10);
    }

    function dayDiff(dateText) {
      if (!dateText) return 9999;
      return Math.round((new Date(dateText).getTime() - new Date(todayText()).getTime()) / 86400000);
    }

    function isExpired(item) {
      return item.deadline && item.deadline < todayText();
    }

    function isSoon(item) {
      const diff = dayDiff(item.deadline);
      return diff >= 0 && diff <= 3;
    }

    function isActive(item) {
      return !isExpired(item) && item.status !== "已售" && item.status !== "暂停";
    }

    function normalize(text) {
      return String(text || "").trim().toLowerCase();
    }

    function priceNumber(item) {
      const n = Number(String(item.specialPrice || "").replace(/[^\d.]/g, ""));
      return Number.isFinite(n) ? n : 0;
    }

    function matchBudget(item, budget) {
      const price = priceNumber(item);
      if (!budget) return true;
      if (!price) return false;
      if (budget === "under100") return price < 100;
      if (budget === "100-150") return price >= 100 && price <= 150;
      if (budget === "150-200") return price > 150 && price <= 200;
      if (budget === "200-300") return price > 200 && price <= 300;
      if (budget === "over300") return price > 300;
      return true;
    }

    function filteredListings() {
      const keyword = normalize($("#searchInput").value);
      const area = normalize($("#areaFilter").value);
      const budget = $("#budgetFilter").value;
      const status = $("#statusFilter").value;
      return listings
        .filter((item) => {
          if (status && item.status !== status) return false;
          if (area && !normalize(item.area).includes(area)) return false;
          if (!matchBudget(item, budget)) return false;
          if (!keyword) return true;
          return [
            item.projectName, item.area, item.specialPrice, item.size,
            item.layout, item.room, item.sellingPoint, item.note
          ].some((value) => normalize(value).includes(keyword));
        })
        .sort((a, b) => {
          const aExpired = isExpired(a) ? 1 : 0;
          const bExpired = isExpired(b) ? 1 : 0;
          if (aExpired !== bExpired) return aExpired - bExpired;
          const aDate = a.deadline || "9999-12-31";
          const bDate = b.deadline || "9999-12-31";
          if (aDate !== bDate) return aDate.localeCompare(bDate);
          return priceNumber(a) - priceNumber(b);
        });
    }

    function safe(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function statusText(item) {
      if (isExpired(item)) return "已过期";
      if (isSoon(item)) return `${dayDiff(item.deadline)}天截止`;
      return item.status || "在售";
    }

    function rowHtml(item, index) {
      const cls = isExpired(item) ? "expired" : isSoon(item) ? "soon" : "";
      const price = item.specialPrice ? `${safe(item.specialPrice)}万` : "-";
      const size = item.size ? `${safe(item.size)}㎡` : "-";
      return `
        <tr class="${cls}">
          <td>
            <div class="actions">
              <button class="row-btn" data-edit="${item.id}">编辑</button>
              <button class="row-btn danger" data-delete="${item.id}">删除</button>
            </div>
          </td>
          <td class="center">${index + 1}</td>
          <td>${safe(item.projectName) || "-"}</td>
          <td class="center">${safe(item.area) || "-"}</td>
          <td class="price">${price}</td>
          <td class="center">${size}</td>
          <td>${safe(item.layout) || "-"}</td>
          <td>${safe(item.room) || "-"}</td>
          <td class="center">${safe(item.deadline) || "-"}</td>
          <td class="center">${safe(item.decoration) || "-"}</td>
          <td class="center">${safe(statusText(item))}</td>
          <td>${safe(item.sellingPoint) || "-"}</td>
          <td>${safe(item.note) || "-"}</td>
        </tr>
      `;
    }

    function renderStats() {
      $("#totalCount").textContent = listings.length;
      $("#activeCount").textContent = listings.filter(isActive).length;
      $("#soonCount").textContent = listings.filter(isSoon).length;
      $("#expiredCount").textContent = listings.filter(isExpired).length;
    }

    function render() {
      renderStats();
      const items = filteredListings();
      body.innerHTML = items.map(rowHtml).join("");
      emptyState.hidden = items.length > 0;
    }

    function openForm(item = null) {
      editingId = item ? item.id : null;
      $("#dialogTitle").textContent = item ? "编辑特价房" : "新增特价房";
      form.reset();
      fields.forEach((field) => {
        form.elements[field].value = item?.[field] || "";
      });
      if (!item) {
        form.elements.decoration.value = "毛坯";
        form.elements.status.value = "在售";
      }
      dialog.showModal();
    }

    function closeForm() {
      dialog.close();
      editingId = null;
    }

    function listingFromForm() {
      const now = new Date().toISOString();
      const oldItem = listings.find((item) => item.id === editingId);
      const data = Object.fromEntries(fields.map((field) => [field, form.elements[field].value.trim()]));
      data.id = editingId || crypto.randomUUID();
      data.createdAt = oldItem?.createdAt || now;
      data.updatedAt = now;
      return data;
    }

    $("#addListing").addEventListener("click", () => openForm());
    $("#closeDialog").addEventListener("click", closeForm);
    $("#cancelEdit").addEventListener("click", closeForm);

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const item = listingFromForm();
      listings = editingId
        ? listings.map((oldItem) => oldItem.id === editingId ? item : oldItem)
        : [item, ...listings];
      saveListings();
      closeForm();
      render();
    });

    body.addEventListener("click", (event) => {
      const editId = event.target.dataset.edit;
      const deleteId = event.target.dataset.delete;
      if (editId) openForm(listings.find((item) => item.id === editId));
      if (deleteId && confirm("确定删除这条特价房源吗？")) {
        listings = listings.filter((item) => item.id !== deleteId);
        saveListings();
        render();
      }
    });

    ["searchInput", "areaFilter", "budgetFilter", "statusFilter"].forEach((id) => {
      $("#" + id).addEventListener("input", render);
      $("#" + id).addEventListener("change", render);
    });

    $("#openTools").addEventListener("click", () => toolsDialog.showModal());
    $("#closeTools").addEventListener("click", () => toolsDialog.close());

    $("#clearFilters").addEventListener("click", () => {
      $("#searchInput").value = "";
      $("#areaFilter").value = "";
      $("#budgetFilter").value = "";
      $("#statusFilter").value = "";
      toolsDialog.close();
      render();
    });

    $("#exportData").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(listings, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `特价房源备份_${todayText()}.json`;
      link.click();
      URL.revokeObjectURL(url);
    });

    $("#importData").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        if (!Array.isArray(data)) throw new Error("格式不正确");
        listings = data;
        saveListings();
        toolsDialog.close();
        render();
      } catch {
        alert("导入失败，请确认是本工具导出的备份文件。");
      } finally {
        event.target.value = "";
      }
    });

    $("#clearAll").addEventListener("click", () => {
      if (confirm("确定清空全部特价房源吗？建议先导出备份。")) {
        listings = [];
        saveListings();
        toolsDialog.close();
        render();
      }
    });

    render();
  </script>
</body>
</html>
